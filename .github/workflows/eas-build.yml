name: EAS Mobile Build

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'mobile/**'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'mobile/**'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ios
          - android

jobs:
  build:
    name: EAS Build (${{ github.event.inputs.profile || 'development' }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Run EAS Build (development — PR/push)
        if: github.event_name != 'workflow_dispatch'
        run: |
          eas build \
            --platform all \
            --profile development \
            --non-interactive \
            --no-wait

      - name: Run EAS Build (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          eas build \
            --platform ${{ github.event.inputs.platform }} \
            --profile ${{ github.event.inputs.profile }} \
            --non-interactive \
            --no-wait
